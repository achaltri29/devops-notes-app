services:

  backend:
    build:
      context: ./backend
    container_name: devops-notes-backend

    ports:
      - "8000:8000"

    environment:
      NOTES_TABLE: NotesTable
      AWS_DEFAULT_REGION: ap-south-1

    volumes:
      - ./backend:/app

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    container_name: devops-notes-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules